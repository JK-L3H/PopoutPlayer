    <!-- Outer rectangle -->
    <rect x="0" y="0" width="64" height="64"
          fill="none" stroke="white" stroke-width="10.24" rx="6.4"/>
    <!-- Inner rectangle (PiP window) -->
    <rect x="19.2" y="32" width="25.6" height="19.2"
          fill="white" rx="2.56"/>
